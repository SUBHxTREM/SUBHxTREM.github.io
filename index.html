<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subhajit Kar | Links</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <h1 class="name">SUBHAJIT KAR <br><span>(SUNNY)</span></h1>
        
        <p class="description">
            All my official links in one place. 🚀<br>
            Feel free to drop a message and let's connect!
        </p>
        
        <div class="links-container">
            
            <a href="https://subhajitportfolio.framer.website/" target="_blank" class="link-btn portfolio-btn">
                <i class="fa-solid fa-fire"></i>
                <span>MY PORTFOLIO</span>
            </a>

            <a href="https://instagram.com/__SUBHxD__" target="_blank" class="link-btn">
                <i class="fa-brands fa-instagram"></i>
                <span>__SUBHxD__</span>
            </a>
            
            <a href="https://t.me/SUBHxD" target="_blank" class="link-btn">
                <i class="fa-brands fa-telegram"></i>
                <span>SUBHxD</span>
            </a>

            <a href="https://linkedin.com/in/subhxtrem" target="_blank" class="link-btn">
                <i class="fa-brands fa-linkedin"></i>
                <span>subhxtrem</span>
            </a>

            <a href="https://internshala.com/" target="_blank" class="link-btn">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>subhbxtrem</span>
            </a>
            
            <a href="https://github.com/SUBHxTREM" target="_blank" class="link-btn">
                <i class="fa-brands fa-github"></i>
                <span>SUBHxTREM</span>
            </a>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#ff0000", "#ff5a00", "#ff9a00", "#ffce00"] }, /* Fire colors */
                "shape": { "type": "circle" },
                "opacity": { 
                    "value": 0.8, 
                    "random": true, 
                    "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
                },
                "size": { 
                    "value": 4, 
                    "random": true, 
                    "anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false }
                },
                "line_linked": { "enable": false }, /* Turned off lines for realistic sparks */
                "move": {
                    "enable": true,
                    "speed": 3,
                    "direction": "top", /* Sparks fly up! */
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" }, /* Push sparks away with mouse */
                    "onclick": { "enable": true, "mode": "push" }
                },
                "modes": {
                    "repulse": { "distance": 80, "duration": 0.4 },
                    "push": { "particles_nb": 6 }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
