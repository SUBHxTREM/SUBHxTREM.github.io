<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyLinks | Subhajit</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff0000,#0d0000);
color:white;
overflow:hidden;
}

/* moving particles */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.1;
animation:bgMove 30s linear infinite;
}

@keyframes bgMove{
from{transform:translate(0,0);}
to{transform:translate(-300px,-300px);}
}

.container{
text-align:center;
z-index:1;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* profile */

.profile{
width:120px;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 20px red;
margin-bottom:15px;
}

.username{
font-size:24px;
font-weight:bold;
}

.bio{
opacity:0.8;
margin-bottom:30px;
}

/* links */

.link{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:320px;
padding:15px;
margin:15px auto;

background:white;
color:black;
text-decoration:none;
font-weight:bold;

border-radius:40px;

transition:0.3s;
}

.link i{
font-size:20px;
}

.link:hover{
transform:scale(1.07);
box-shadow:0 0 20px red;
}

</style>

</head>

<body>

<div class="container">

<img src="profile.jpg" class="profile">

<div class="username">@YourUsername</div>
<div class="bio">Hello, I'm Subhajit 👋</div>

<a href="#" class="link">
<i class="fab fa-instagram"></i> Instagram
</a>

<a href="#" class="link">
<i class="fab fa-telegram"></i> Telegram
</a>

<a href="#" class="link">
<i class="fab fa-linkedin"></i> LinkedIn
</a>

<a href="#" class="link">
<i class="fas fa-briefcase"></i> Internshala
</a>

<a href="#" class="link">
<i class="fab fa-github"></i> GitHub
</a>

</div>

</body>
</html>
